spring.application.name=product-service
server.port=8081

spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_service_db}
spring.datasource.username=${DATASOURCE_USERNAME:username}
spring.datasource.password=${DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=none

cloudinary.cloud.name=${CLOUD_NAME}
cloudinary.api.key=${API_KEY}
cloudinary.api.secret=${API_SECRET}
